name: Populate Team Weekly Stats

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "Weeks to pull, e.g. '1-12', '5', or 'current'"
        required: true
        default: "current"

  schedule:
    - cron: "0 11 * * 1"

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run populate_team_weekly_stats.py
        env:
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CONSUMER_KEY }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CONSUMER_SECRET }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 populate_team_weekly_stats.py --weeks "${{ github.event.inputs.weeks }}"
          else
            python3 populate_team_weekly_stats.py --weeks current
          fi
